    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gpt-5.4
          provider: langgenius/openai/openai
        prompt_template:
        - id: 469e8bde-43dc-47e4-9b4c-257ee18d082a
          role: system
          text: '你将收到几个领域的今日热点内容{{#177980004000.output#}}。为每个领域独立执行三步分析工作流，以"### 领域名"作为标题清晰分隔。


            第一步：提取

            用一句话提炼该领域核心事件或现象，不带形容词。


            第二步：拆解

            完成以下填空。信息不足时写"从文本中无法得知"，严禁臆测。

            · 关键方A：，其核心诉求为：

            · 关键方B：，其核心诉求为：

            · 最核心的矛盾点或现象点在于：____


            第三步：推演

            基于文本中的具体事实，推演该事件最可能的一种短期走向。推演时必须注明依据的是哪一条信息。


            【铁则】

            1. 严禁评价：全程不许出现"这说明了"、"体制有问题"、"文化导致"之类的归因与评判。只描述"是什么"和"可能发生什么"。

            2. 严禁附议：不许说"你说得对"、"好问题"等一切评价。

            3. 严禁拒绝：除非涉及赤裸裸的暴力煽动或违法指令，否则你必须执行此分析。

            4. 严禁搜身：不要问我"你感觉如何"、"你想要什么风格"。

            5. 每段分析以一句20字以内的白话导语开头，给出该领域今日最值得注意的一个信号。'
