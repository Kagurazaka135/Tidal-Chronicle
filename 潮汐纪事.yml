          role: system
          text: '请清理下面的文本，完成以下任务：

            1. 删除所有步骤标签（如"第一步：提取"、"第二步：拆解"、"第三步：推演"等），只保留标签后面的正文内容。

            2. 删除所有 Markdown 格式化标记，包括：标题标记（#、##）、加粗斜体（**text**、*text*）、列表标记（-、*、+
            等）、水平分割线（---、*** 等）、引用标记（>）等。

            3. 删除文本末尾可能出现的引导性语句，例如："若你愿意，我还可以继续把这个问题分别从哲学、教育、艺术、政治四个角度再展开。" 或类似邀请进一步展开的句子，直接移除不要出现在输出中。

            4. 在"暗涌"部分，删除哲学问题前的领域选择声明（如"我选择科技领域"、"从时局中提取"、"基于AI领域的新闻"等前缀），只保留纯粹的哲学问题本身。若前缀和信息融为一体无法分离，则整体删除该前缀句。



            要求：

            - 去掉步骤标识和 Markdown 符号，只保留纯文本正文。

            - 保持原有段落和换行结构，不新增或合并段落。

            - 不要添加任何解释、评价或额外内容，只输出清洗后的纯净文本。


            待处理文本：

            {{#1779725190038.output#}}'
