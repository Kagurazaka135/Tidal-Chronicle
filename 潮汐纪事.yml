    - data:
        code: "import re\n\ndef main(arg1: str) -> dict:\n    text = arg1 or \"\"\n\
          \    \n    if len(text.strip()) < 50:\n        return {\"result\": \"今日潮汐未至，海面风平浪静。明日再垂钓。\\\
          n\\n—— 深海之主\"}\n    \n    # 1. DeepSeek XML 标签\n    text = re.sub(r'<think>.*?</think>\\\
          s*', '', text, flags=re.DOTALL)\n    text = re.sub(r'<think>.*$', '', text,\
          \ flags=re.DOTALL)\n    \n    # 2. DeepSeek R1/V3 分隔符 / answer\n    text\
          \ = re.sub(r'^.*?\\s*(?:| answer)\\s*', '', text, flags=re.DOTALL)\n   \
          \ \n    # 3. 元分析自言自语（整行匹配，防止误删正文）\n    meta_patterns = [\n        r'^.{0,10}(?:我需要|我打算|我准备|我决定|我注意到|我认为应该).{0,80}?(?:来回应|来回答|来思考|来展开)[。]?\\\
          s*$',\n        r'^.{0,6}(?:可以借鉴|可以引用|可以类比|可以借用).{0,60}?[。]?\\s*$',\n   \
          \     r'^.{0,6}(?:关键在于|核心在于|重点在于|难点在于).{0,60}?[。]\\s*$',\n        r'^.{0,10}(?:这个问题|这个提问|这道题).{0,40}?(?:触及|涉及|关于|围绕).{0,40}?[。]\\\
          s*$',\n        r'^嗯[，,].{0,30}?(?:这个问题|很有|值得|确实|不错).{0,60}?[。]?\\s*$',\n\
          \    ]\n    for p in meta_patterns:\n        text = re.sub(p, '', text,\
          \ flags=re.MULTILINE)\n    \n    # 4. 领域选择前缀\n    text = re.sub(r'从.{1,6}领域.{0,20}(?:提取|选择|中)[：:，。]?\\\
          s*', '', text)\n    text = re.sub(r'我选择.{1,6}领域[。，]?\\s*', '', text)\n \
          \   text = re.sub(r'基于.{1,6}领域.{0,10}[：:]\\s*', '', text)\n    \n    # 5.\
          \ Markdown 格式\n    text = re.sub(r'#{1,6}\\s?', '', text)\n    text = re.sub(r'\\\
          *{1,2}([^*]+)\\*{1,2}', r'\\1', text)\n    text = re.sub(r'^[-*+] ', '',\
          \ text, flags=re.MULTILINE)\n    text = re.sub(r'^>\\s?', '', text, flags=re.MULTILINE)\n\
          \    text = re.sub(r'^---+$', '', text, flags=re.MULTILINE)\n    \n    #\
          \ 6. 步骤标签 + 引导句 + 铁则\n    text = re.sub(r'第[一二三四五六七八九十\\d]+步[：:]?\\s*',\
          \ '', text)\n    text = re.sub(r'若你愿意.*?再展开[。！]?', '', text)\n    text =\
          \ re.sub(r'【铁则】.*', '', text, flags=re.DOTALL)\n    \n    cleaned = text.strip()\n\
          \    if len(cleaned) < 50:\n        return {\"result\": \"今日潮汐未至，海面风平浪静。明日再垂钓。\\\
          n\\n—— 深海之主\"}\n    \n    return {\"result\": cleaned}"
